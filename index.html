<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>

<body>

  <img src="" alt="" usemap="#map">
  <map name="map">
    <area shape="rect" coords="90,88,496,298" href="https://codeyad.com">
    <area shape="circle" coords="274,577,150" href="https://codeyad.com">
    <area shape="poly" coords="917,266,1072,547,764,546" href="https://codeyad.com">
  </map>

  <table>
    <thead>
      <tr>
        <th colspan="2">INFOS</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td rowspan="2">POURYA</td>
        <td rowspan="2">32</td>
      </tr>
      <tr>
      </tr>
    </tbody>
  </table>

  <ul>
    <li>text</li>
    <li>text</li>
    <li>text</li>
    <li>text</li>
    <li>text</li>
  </ul>


  <dl>
    <dt>POURYA</dt>
    <dd>SOLEIMANI</dd>
  </dl>

  <fieldset>
    <legend>فرم ثبت نام</legend>
    <form action="">

      <table width="450" border="0" align="center">
        <tr>
          <td width="150" align="left">
            نام کاربری :
          </td>
          <td>
            <input type="text" maxlength="10" size="20" placeholder="نام کاربری خود را وارد کنید">
          </td>
        </tr>

        <tr>
          <td width="150" align="left">
            رمز عبور :
          </td>
          <td>
            <input type="password" maxlength="10" size="20" placeholder="رمز عبور خود را وارد کنید">
          </td>
        </tr>

        <tr>
          <td width="150" align="left">
            ایمیل :
          </td>
          <td>
            <input type="email" size="20" placeholder="ایمیل خود را وارد کنید">
          </td>
        </tr>

        <tr>
          <td width="150" align="left" valign="top">
            آدرس :
          </td>
          <td>
            <textarea rows="10" cols="30"></textarea>
          </td>
        </tr>

        <tr>
          <td width="150" align="left" valign="top">
            جنسیت :
          </td>
          <td>
            <input class="fav" type="radio" name="milad">مرد
            <input class="fav" type="radio" name="milad">زن
          </td>
        </tr>

        <tr>
          <td width="150" align="left" valign="top">
            شهر :
          </td>
          <td>
            <select>
              <option>اصفهان</option>
              <option>تهران</option>
              <option selected>شیراز</option>
              <option>تبریز</option>
            </select>
          </td>
        </tr>

        <tr>
          <td width="150" align="left" valign="top">
            استان :
          </td>
          <td>
            <select>
              <optgroup label="استان 1">
                <option>شهر 1 از استان 1</option>
                <option>شهر 2 از استان 1</option>
                <option>شهر 3 از استان 1</option>
              </optgroup>
              <optgroup label="استان 2">
                <option>شهر 1 از استان 2</option>
                <option>شهر 2 از استان 2</option>
                <option>شهر 3 از استان 2</option>
              </optgroup>
            </select>
          </td>
        </tr>

        <tr>
          <td width="150" align="left" valign="top">
            <label>علاقه مندی ها</label>
          </td>
          <td>
            <input class="fav" type="checkbox" checked>
            <span>موزیک</span>
            <input class="fav" type="checkbox">
            <span>سفر</span>
            <input class="fav" type="checkbox">
            <span>ورزش</span>
          </td>
        </tr>
        <tr>
          <td width="150" align="left" valign="top">
            فایل
          </td>
          <td>
            <input type="file">
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
            <input type="submit" value="ثبت نام">
            <input type="reset" value="پاک کردن فرم">
          </td>
        </tr>
      </table>

    </form>
  </fieldset>


  <script src="./script.js"></script>
  <script src="./animals.js"></script>
</body>

</html>
